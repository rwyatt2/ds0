name: Feature Request
description: Suggest a new component, feature, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New Component
        - New Recipe
        - Component Enhancement
        - Token / Theme
        - CLI Improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: use_cases
    attributes:
      label: Use Cases
      description: When would someone use this? Give specific examples.
    validations:
      required: true

  - type: textarea
    id: api_proposal
    attributes:
      label: Proposed API (optional)
      description: If you have an idea of what the API should look like.
      render: tsx

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links to similar implementations.
