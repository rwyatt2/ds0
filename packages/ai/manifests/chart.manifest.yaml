name: Chart
category: Data Viz
description: A chart component supporting bar, line, and area chart types with built-in SVG rendering, grid, and legend.
use_when: [Visualizing trends over time, Comparing datasets, Dashboard analytics]
do_not_use_when: [Simple inline trends → use Sparkline, Single numeric display → use StatCard]
props:
  type: { type: "'line' | 'bar' | 'area' | 'pie' | 'donut'", default: "'bar'", description: Chart type }
  labels: { type: "string[]", description: X-axis labels }
  datasets: { type: "ChartDataset[]", description: Data series }
  title: { type: string, description: Chart title }
  showLegend: { type: boolean, default: true }
  showGrid: { type: boolean, default: true }
accessibility: { role: img, screen_reader: ["Announces chart type, dataset count, and label count"] }
related_components:
  Sparkline: Inline mini chart
  StatCard: Single metric display
storybook_path: /docs/components-dataviz-chart
