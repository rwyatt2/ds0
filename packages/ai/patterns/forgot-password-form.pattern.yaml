name: ForgotPasswordForm
category: Authentication
description: A password reset request form with email input and success state.

use_when:
  - User forgot their password and needs a reset link
  - Application has password recovery flow

composed_of:
  - Card
  - TextField
  - Button
  - Link
  - Alert
  - Stack
  - Text
  - Heading

customization_points:
  - Submit handler for sending reset email
  - Back to login navigation
  - Success state messaging

variants:
  - Default: Email form with submit button
  - Success: Confirmation message after submission

related_patterns:
  - LoginForm: Main login form
  - SignupForm: User registration form
